name = "fortuna"
version = "0.1.0"
license = "AGPL-3.0-or-later"
author = "fortuna contributors"
copyright = "Copyright 2026 fortuna contributors"
description = "Monte Carlo personal-finance forecaster, full-stack Fortran: CLI, engine, and a dependency-free HTTP web UI"
categories = ["finance", "simulation", "web"]
keywords = ["monte-carlo", "retirement", "finance", "http-server"]

[build]
auto-executables = true
auto-tests = true

[install]
library = false

[fortran]
implicit-typing = false
implicit-external = false
source-form = "free"
